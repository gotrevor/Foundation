name = "Foundation"
defaultTargets = ["Foundation"]

[leanOptions]
pp.unicode.fun = true
weak.linter.flexible = true
weak.linter.refine = true
weak.linter.oldObtain = true
weak.linter.style.multiGoal = true

[[lean_lib]]
name = "Foundation"

# doc-gen4 require removed for the mathlib-version migration (docs tooling, not needed
# to compile the Foundation lib; drops 5 extra deps that would also need version compat).
[[require]]
scope = "leanprover-community"
name = "mathlib"
rev = "v4.31.0"
